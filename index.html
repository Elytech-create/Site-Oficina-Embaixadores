<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minha Página de Mídia</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            /* Substitua a URL abaixo pela sua imagem de fundo */
            background: url('imagem.png') no-repeat center center fixed;
            background-size: cover;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.7);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            width: 80%;
            max-width: 600px;
        }

        audio {
            width: 100%;
            margin-top: 20px;
        }

        .video-container {
            margin-top: 30px;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Minha Jornada</h1>
        
        <audio controls>
            <source src="musica.mp3" type="audio/mpeg">
            Seu navegador não suporta o elemento de áudio.
        </audio>

        <div class="video-container">
            <iframe 
                src="https://www.youtube.com/embed/SUA_ID_DO_VIDEO_AQUI" 
                frameborder="0" 
                allowfullscreen>
            </iframe>
        </div>
    </div>

</body>
</html>
